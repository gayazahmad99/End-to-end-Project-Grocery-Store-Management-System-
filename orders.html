<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/orders.css">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 shadow-sm">
    <span class="navbar-brand fw-bold">🛒 Grocery Store</span>

    <div class="d-flex gap-2">
        <a href="/" class="btn btn-light btn-sm">🏠 Home</a>
        <a href="/productsPage" class="btn btn-warning btn-sm">📦 Products</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4 title">Create Order</h2>

    <!-- FORM CARD -->
    <div class="card shadow-lg p-4 mb-4 form-card">

        <input id="customer" class="form-control mb-3 input-style" placeholder="Customer Name">

        <select id="product" class="form-select mb-3 input-style"></select>

        <input id="qty" type="number" class="form-control mb-3 input-style" placeholder="Quantity">

        <button onclick="addToCart()" class="btn btn-primary w-100 btn-lg">
            ➕ Add to Cart
        </button>
    </div>

    <!-- CART CARD -->
    <div class="card shadow-lg p-4 mb-4 cart-card">
        <h5 class="mb-3">🛒 Cart</h5>

        <ul id="cart" class="list-group mb-3"></ul>

        <div class="d-flex justify-content-between align-items-center">
            <h5>Total:</h5>
            <h4 class="text-success fw-bold">Rs <span id="total">0</span></h4>
        </div>

        <button onclick="placeOrder()" class="btn btn-success w-100 mt-3 btn-lg">
            ✅ Place Order
        </button>
    </div>

    <!-- ORDERS TABLE -->
    <div class="card shadow-lg p-4 orders-card">
        <h4 class="mb-3">📦 All Orders</h4>

        <button onclick="loadOrders()" class="btn btn-info mb-3">
            🔄 Load Orders
        </button>

        <div class="table-responsive">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody id="orders"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="/static/js/orders.js"></script>

</body>
</html>
