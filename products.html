<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 shadow-sm">
    <span class="navbar-brand fw-bold">🛒 Grocery Store</span>

    <div class="d-flex gap-2">
        <a href="/" class="btn btn-light btn-sm">🏠 Home</a>
        <a href="/ordersPage" class="btn btn-warning btn-sm">📦 Orders</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4 title">Products</h2>

    <!-- ADD PRODUCT -->
    <div class="card shadow-lg p-4 mb-4 form-card">

        <h5 class="mb-3">➕ Add Product</h5>

        <input id="name" class="form-control mb-3 input-style" placeholder="Product Name">

        <input id="price" type="number" class="form-control mb-3 input-style" placeholder="Price">

        <select id="uom" class="form-select mb-3 input-style">
            <option value="">Select UOM</option>
            <option value="1">KG (Weight)</option>
            <option value="2">Countable</option>
        </select>

        <button onclick="addProduct()" class="btn btn-success w-100 btn-lg">
            ➕ Add Product
        </button>
    </div>

    <!-- TABLE -->
    <div class="card shadow-lg p-5 table-card">

        <h5 class="mb-3">📦 Product List</h5>

        <div class="table-responsive">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>UOM</th>
                        <th>Price</th>
                        <th>Action</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="table"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/products.js') }}"></script>

</body>
</html>
