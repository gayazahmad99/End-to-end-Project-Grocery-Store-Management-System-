<!DOCTYPE html>
<html>
<head>
    <title>GSMS Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .card {
            margin-top: 80px;
            padding: 40px;
            border-radius: 20px;
            background: #ffffff;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-weight: 600;
        }

        .btn {
            padding: 10px 25px;
            font-weight: 500;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
        }

        .btn-success {
            background-color: #28a745;
            border: none;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        hr {
            margin: 25px 0;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center">

    <div class="card text-center" style="max-width: 600px; width: 100%;">

        <h2 class="mb-4">🛒 Grocery Store Management System</h2>

        <p class="text-muted">Manage your products and orders easily</p>

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-3 mt-4">

            <!-- Orders -->
            <a href="/ordersPage" class="btn btn-primary">
                🏠 Home / Orders
            </a>

            <!-- Products -->
            <a href="/productsPage" class="btn btn-success">
                📦 Manage Products
            </a>

        </div>

        <hr>

        <h5 class="mt-3">Welcome to Dashboard 🚀</h5>

        <p class="footer-text">
            Powered by Flask + Bootstrap
        </p>

    </div>

</div>

</body>
</html>
